apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finassistant-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
  - host: finassistant.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: finassistant-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finassistant-frontend
            port:
              number: 80
